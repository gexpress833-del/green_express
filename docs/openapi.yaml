openapi: 3.0.3
info:
  title: Green Express API
  description: API du système de commande alimentaire Green Express
  version: 1.0.0

servers:
  - url: http://127.0.0.1:8000/api
    description: Développement local

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  security:
    - bearerAuth: []

paths:
  /login:
    post:
      summary: Connexion
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
      responses:
        '200':
          description: Token JWT retourné
        '401':
          description: Identifiants invalides

  /register:
    post:
      summary: Inscription
      tags: [Auth]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                email: { type: string, format: email }
                password: { type: string }
      responses:
        '201':
          description: Compte créé

  /me:
    get:
      summary: Utilisateur courant
      tags: [Auth]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Profil utilisateur

  /menus:
    get:
      summary: Liste des menus (admin)
      tags: [Menus]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: status
          in: query
          schema: { type: string, enum: [draft, pending, approved, rejected] }
        - name: per_page
          in: query
          schema: { type: integer, default: 15 }
      responses:
        '200':
          description: Liste paginée
    post:
      summary: Créer un menu
      tags: [Menus]
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [title, price]
              properties:
                title: { type: string }
                description: { type: string }
                price: { type: number }
                currency: { type: string, maxLength: 3 }
                status: { type: string, enum: [draft, pending, approved, rejected] }
      responses:
        '201':
          description: Menu créé
        '422':
          description: Erreur de validation

  /menus/{id}:
    get:
      summary: Détail d'un menu
      tags: [Menus]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Détail du menu
    put:
      summary: Modifier un menu
      tags: [Menus]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string }
                description: { type: string }
                price: { type: number }
                currency: { type: string }
                status: { type: string, enum: [draft, pending, approved, rejected] }
      responses:
        '200':
          description: Menu mis à jour
        '403':
          description: Non autorisé
    delete:
      summary: Supprimer un menu
      tags: [Menus]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '204':
          description: Supprimé
        '403':
          description: Non autorisé

  /promotions:
    get:
      summary: Liste des promotions (public)
      tags: [Promotions]
      parameters:
        - name: active_only
          in: query
          schema: { type: boolean }
        - name: menu_id
          in: query
          schema: { type: integer }
        - name: per_page
          in: query
          schema: { type: integer }
      responses:
        '200':
          description: Liste paginée
    post:
      summary: Créer une promotion (admin)
      tags: [Promotions]
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                menu_id: { type: integer }
                points_required: { type: integer }
                discount: { type: number }
                quantity_limit: { type: integer }
                start_at: { type: string, format: date-time }
                end_at: { type: string, format: date-time }
      responses:
        '201':
          description: Promotion créée

  /promotions/{id}/claim:
    post:
      summary: Réclamer une promotion (client)
      tags: [Promotions]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Promotion réclamée
        '400':
          description: Points insuffisants / promotion expirée / épuisée

  /orders:
    get:
      summary: Liste des commandes
      tags: [Orders]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Liste (filtrée par utilisateur ou tout pour admin)
    post:
      summary: Créer une commande
      tags: [Orders]
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [items, delivery_address]
              properties:
                items:
                  type: array
                  items:
                    type: object
                    required: [menu_id, quantity]
                    properties:
                      menu_id: { type: integer }
                      quantity: { type: integer }
                      price: { type: number }
                delivery_address: { type: string }
                company_id: { type: integer }
      responses:
        '201':
          description: Commande créée
        '422':
          description: Erreur de validation
